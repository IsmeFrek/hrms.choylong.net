<!doctype html>
<html lang="km">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>ចុះឈ្មោះមុខ (Face Enroll)</title>
  <style>
    :root{font-size:16px;color-scheme:light}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#0b1220;color:#e5e7eb}
    header{position:sticky;top:0;background:rgba(11,18,32,0.92);backdrop-filter:blur(8px);border-bottom:1px solid rgba(148,163,184,0.18);padding:12px 14px;z-index:10}
    header h1{font-size:1.05rem;margin:0;display:flex;align-items:center;gap:10px;justify-content:space-between}
    header a{color:#93c5fd;text-decoration:none;font-size:0.95rem}
    main{padding:14px;max-width:860px;margin:0 auto}
    .grid{display:grid;grid-template-columns:1fr;gap:10px}
    .card{background:rgba(15,23,42,0.75);border:1px solid rgba(148,163,184,0.18);border-radius:12px;padding:12px}
    label{display:block;font-size:0.9rem;color:#cbd5e1;margin-bottom:6px}
    input,button,textarea{width:100%;border-radius:10px;border:1px solid rgba(148,163,184,0.25);background:#0b1220;color:#e5e7eb;padding:12px 12px;font-size:1rem}
    input::placeholder{color:#64748b}
    button{border:0;cursor:pointer;font-weight:650}
    button.primary{background:#22c55e;color:#04110a}
    button.secondary{background:#111827;color:#e5e7eb;border:1px solid rgba(148,163,184,0.22)}
    button.danger{background:#ef4444;color:#fff}
    button:disabled{opacity:0.55;cursor:not-allowed}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .videoWrap{position:relative;border-radius:9999px;overflow:hidden;background:#000;border:1px solid rgba(148,163,184,0.22);aspect-ratio:1/1;max-width:360px;margin:0 auto}
    video{width:100%;height:100%;object-fit:cover;display:block;transform:scaleX(-1)}
    .hint{color:#94a3b8;font-size:0.9rem;line-height:1.35}
    .badge{display:inline-block;padding:6px 10px;border-radius:999px;font-size:0.85rem;border:1px solid rgba(148,163,184,0.22);background:rgba(2,6,23,0.6)}
    .ok{color:#86efac}
    .warn{color:#fde68a}
    .err{color:#fecaca}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    pre{white-space:pre-wrap;margin:0}
    @media (min-width:860px){.grid{grid-template-columns:1.25fr 0.75fr}}
  </style>
</head>
<body>
  <header>
    <h1>
      <span>ចុះឈ្មោះមុខ (Enroll)</span>
      <a href="/attendance.html">ទៅវត្តមាន</a>
    </h1>
  </header>

  <main>
    <div class="grid">
      <section class="card">
        <div class="videoWrap">
          <video id="video" playsinline autoplay muted></video>
        </div>
        <div class="row" style="margin-top:10px">
          <button id="start" class="primary" type="button" style="display:none">បើកកាមេរ៉ា</button>
          <button id="capture" class="secondary" type="button" disabled>យករូបពី HR + Enroll</button>
          <button id="upload" class="secondary" type="button" disabled>យករូបពីឯកសារ + Enroll</button>
        </div>
        <input id="fileInput" type="file" accept="image/*" style="display:none" />
      </section>

      <aside class="card">
        <div class="row" style="gap:8px">
          <div style="flex:1 1 180px">
            <label>Staff ID <span class="mono">(ត្រូវការ)</span></label>
            <input id="staffId" placeholder="12345" inputmode="numeric" class="mono" />
          </div>
          <div style="flex:1 1 180px">
            <label>ឈ្មោះ (optional)</label>
            <input id="fullName" placeholder="គោត្តមាន និង នាម" />
          </div>
        </div>

        <div style="margin-top:10px">
          <label>Privacy/Consent <span class="mono">(ត្រូវការ)</span></label>
          <div class="hint" style="margin-bottom:8px">
            ខ្ញុំយល់ព្រមឲ្យប្រព័ន្ធរក្សាទុក “face template/embedding” សម្រាប់កំណត់អត្តសញ្ញាណ (មិនមែនរក្សាទុកវីដេអូជានិច្ច) និងអាចលុបបានពេលណាក៏បាន។
          </div>
          <label style="display:flex;gap:10px;align-items:flex-start;margin:0">
            <input id="consent" type="checkbox" style="width:22px;height:22px;margin-top:2px" />
            <span>យល់ព្រម (Consent)</span>
          </label>
        </div>

        <div class="row" style="margin-top:10px">
          <button id="delete" class="danger" type="button" style="flex:1 1 120px">លុប Face Profile</button>
          <button id="fixId" class="secondary" type="button" style="flex:1 1 120px" disabled>Fix ID (Face Profile)</button>
        </div>

        <div style="margin-top:10px">
          <span id="support" class="badge warn">កំពុងទាញ face models...</span>
        </div>

        <pre id="result" style="margin-top:10px"></pre>

        <p class="hint" style="margin-top:10px">
          សំខាន់: Camera នៅលើទូរស័ព្ទត្រូវការ <span class="mono">HTTPS</span> (ឬ localhost) ដើម្បីអនុញ្ញាត getUserMedia។
        </p>
      </aside>
    </div>

    <section class="card" style="margin-top:12px">
      <div class="row" style="justify-content:space-between;align-items:center;margin-bottom:4px">
        <label style="margin:0">Face Profiles (បង្ហាញធំ ចំនុច show)</label>
        <button id="autoEnrollAll" type="button" class="primary" style="flex:0 0 auto;width:auto;padding:6px 14px;font-size:0.85rem;background:#16a34a;color:#ecfdf5">Enroll អូតូ ពី HR</button>
      </div>
      <div id="profilesShow" class="hint mono" style="max-height:420px;overflow:auto;border-top:1px solid rgba(148,163,184,0.22);margin-top:4px;padding-top:4px"></div>
    </section>

    <script src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="/face_enroll.js"></script>
  </main>
</body>
</html>
