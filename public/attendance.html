<!doctype html>
<html lang="km">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>បង្កើត វត្តមាន - Attendance</title>
  <style>
    .req{color:#b91c1c;margin-left:6px;font-weight:600}
    :root{font-size:16px}
    *{box-sizing:border-box}
    body{font-family:Arial, Helvetica, sans-serif;margin:16px;padding:8px;background:#fff;color:#111}
    .container{max-width:760px;margin:0 auto;padding:8px}
    h2{font-size:1.4rem;margin-bottom:8px}
    label{display:block;margin-top:12px;font-size:0.95rem}
    input,textarea,select{width:100%;padding:10px;margin-top:6px;border:1px solid #ccc;border-radius:4px;font-size:1rem}
    button{margin-top:14px;padding:12px 16px;border-radius:6px;background:#16a34a;color:#fff;border:0;font-size:1rem}
    button.secondary{background:#eee;color:#111;border:1px solid #ccc;margin-right:8px}
    .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .small{flex:1 1 140px;min-width:120px}
    .note{color:#444;margin-top:8px;font-size:0.95rem}
    form{background:transparent}
    input[type=file]{padding:6px}
    @media (min-width:700px){
      input,textarea,select{font-size:0.98rem}
      .small{width:160px}
    }
    @media (max-width:220px){
      body{margin:0px}
      h2{font-size:1.2rem}
      button{width:100%;padding:1px}
      .row{gap:2px}
      label{font-size:0.85rem}
    }
    /* Responsive table styles for mobile-friendly records list */
    .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-top:1px}
    .records-table{width:100%;border-collapse:collapse;min-width:520px;border:1px solid #e5e7eb}
    .records-table th,.records-table td{padding:5px 8px;border:1px solid #e5e7eb;text-align:left}
    .records-table{table-layout:fixed}
    /* Column widths: 1:serial,2:staffId,3:fullName,4:date,5:checkIn,6:checkOut,7:notes,8:approved,9:actions */
    .records-table th:nth-child(1), .records-table td:nth-child(1){
      width: 3ch;
      max-width: 3ch;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: center;
      padding-left:1px;
      padding-right:1px;
    }
    .records-table th:nth-child(2), .records-table td:nth-child(2){width:60px; text-align:center}
    .records-table th:nth-child(3), .records-table td:nth-child(3){width:80px;white-space:normal}
    .records-table th:nth-child(4), .records-table td:nth-child(4){width:60px; text-align:center}
    .records-table th:nth-child(5), .records-table td:nth-child(5){width:50px; text-align:center}
    .records-table th:nth-child(6), .records-table td:nth-child(6){width:50px; text-align:center}
    .records-table th:nth-child(7), .records-table td:nth-child(7){width:100px;white-space:normal}
    .records-table th:nth-child(8), .records-table td:nth-child(8){width:50px; text-align:center}
    .records-table th:nth-child(9), .records-table td:nth-child(9){width:50px;text-align:center}
      /* Compact button used in table actions */
      .btn-compact{padding:0px 0px;border-radius:0px;font-size:0.5rem;line-height:0;min-width:0px;display:inline-block}
      .btn-compact.primary{background:#2563eb;color:#fff;border:0}
      .btn-compact.danger{background:#ef4444;color:#fff;border:0}
    .records-table thead th{background:#f8fafc}
    @media (max-width:20px){
      .records-table{min-width:320px}
      .records-table th,.records-table td{padding:1px;font-size:0.8rem}
      .container{padding:1px}
    }
  </style>
</head>
<body>
  <h2>បញ្ចូលវត្តមាន</h2>
  <div class="container">
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 2px">
      <a href="/mobileApp/attendance" style="display:inline-block;padding:10px 12px;border-radius:8px;background:#2563eb;color:#fff;text-decoration:none">ស្កេនវត្តមាន (ទូរស័ព្ទ)</a>
      <a href="/face_scan.html" style="display:inline-block;padding:10px 12px;border-radius:8px;background:#16a34a;color:#fff;text-decoration:none">ស្កេនមុខ (Face Scan)</a>
      <a href="/face_enroll.html" style="display:inline-block;padding:10px 12px;border-radius:8px;background:#0ea5e9;color:#fff;text-decoration:none">ចុះឈ្មោះមុខ (Enroll)</a>
    </div>
  <form id="attendanceForm">
    <label>លេខកាត់បុគ្គលិក<span class="req">*</span>
      <input name="staffId" required placeholder="លេខកាត់ (ដូចជា 12345)" maxlength="30" />
    </label>

    <label>គោត្តមាន និង នាម<span class="req">*</span>
      <input name="fullName" required placeholder="ឈ្មោះ ពេញ" maxlength="100" />
    </label>

    <div class="row">
      <label class="small">ថ្ងៃខែឆ្នាំមានបញ្ហា<span class="req">*</span>
        <input type="text" name="date" required placeholder="dd/mm/yyyy" pattern="\d{1,2}/\d{1,2}/\d{4}" inputmode="numeric" title="Format: dd/mm/yyyy" maxlength="10" />
      </label>
      <label class="small">ម៉ោងចូល<span class="req">*</span>
        <input type="text" name="checkIn" required placeholder="HH:MM" maxlength="5" />
      </label>
      <label class="small">ម៉ោងចេញ<span class="req">*</span>
        <input type="text" name="checkOut" required placeholder="HH:MM" maxlength="5" />
      </label>
    </div>

    <label style="display:none">ស្កេនចូល (optional)
      <input type="file" name="scanIn" accept="image/*" />
    </label>
    <label style="display:none">ស្កេនចេញ (optional)
      <input type="file" name="scanOut" accept="image/*" />
    </label>

    <!-- approval is handled by admin from the records list; removed select from form -->

    <label>ផ្សេងៗ / កំណត់សម្គាល់<span class="req">*</span>
      <input name="notes" list="notesList" required placeholder="ជ្រើសរើស ឬ សរសេរ កំណត់សម្គាល់..." maxlength="300" />
      <datalist id="notesList">
        <option value="យឺត (Late)"></option>
        <option value="ភ្លេច"></option>
        <option value="ភ្លេចស្កេនចុះយាម"></option>
      

      </datalist>
    </label>

    <div style="display:flex;gap: 10px;flex-wrap:wrap;margin-top:1px">
      <button type="submit">ដាក់ស្នើ</button>
      <button type="button" class="secondary" onclick="document.getElementById('attendanceForm').reset()">លុប</button>
      <button type="button" id="showRecords" class="secondary">បង្ហាញកំណត់ត្រា</button>
    </div>
  </form>
  </div>

  <div id="result" class="note"></div>
  
    <div id="recordsList" class="note" style="margin-top:1px"></div>

  <!-- flatpickr for friendly datepicker (altInput shows dd/mm/yyyy while value is ISO) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

  <script src="/attendance.js"></script>
</body>
</html>
